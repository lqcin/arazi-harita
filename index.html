<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arazi Harita">
<meta name="theme-color" content="#1a1a2e">
<title>Arazi Harita</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent: #4a9eff;
    --accent2: #00d4aa;
    --danger: #ff6b6b;
    --text: #e8eaf0;
    --text2: #8892a4;
    --border: rgba(255,255,255,0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; color: var(--text); }

  #map { position: absolute; inset: 0; z-index: 1; }

  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to bottom, rgba(15,15,26,0.95) 70%, transparent);
    padding: 12px 12px 20px;
    display: flex; align-items: center; gap: 8px;
  }
  #upload-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 20px;
    padding: 8px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  #file-input { display: none; }
  #file-label {
    flex: 1; font-size: 12px; color: var(--text2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #coord-display {
    background: rgba(15,15,26,0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px; color: var(--text2);
    font-family: 'SF Mono', monospace;
    white-space: nowrap;
  }

  /* Bottom toolbar */
  #toolbar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to top, rgba(15,15,26,0.97) 60%, transparent);
    padding: 20px 12px 24px;
    display: flex; gap: 8px; align-items: flex-end;
  }
  .tool-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 11px; color: var(--text2); cursor: pointer;
    flex: 1; min-width: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .tool-btn .icon { font-size: 20px; }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tool-btn.gps-active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* Layer panel */
  #layer-panel {
    position: absolute; left: 12px; right: 12px; bottom: 90px; z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: none;
    max-height: 280px; overflow-y: auto;
  }
  #layer-panel h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .layer-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .layer-item:last-child { border-bottom: none; }
  .layer-toggle {
    width: 36px; height: 20px; border-radius: 10px;
    background: var(--accent); flex-shrink: 0;
    position: relative; transition: background 0.2s;
  }
  .layer-toggle.off { background: var(--border); }
  .layer-toggle::after {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; top: 2px; left: 18px;
    transition: left 0.2s;
  }
  .layer-toggle.off::after { left: 2px; }
  .layer-name { font-size: 13px; color: var(--text); flex: 1; }
  .layer-count { font-size: 11px; color: var(--text2); }
  .layer-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Distance panel */
  #dist-panel {
    position: absolute; top: 70px; left: 12px; right: 12px; z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: none;
    font-size: 13px;
  }
  #dist-panel .title { color: var(--text2); margin-bottom: 6px; font-size: 12px; }
  #dist-value { font-size: 22px; font-weight: 700; color: var(--accent2); }
  #dist-clear { float: right; color: var(--danger); font-size: 12px; cursor: pointer; margin-top: 4px; }

  /* Toast */
  #toast {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    z-index: 300; background: rgba(30,30,50,0.95);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 8px 18px; font-size: 13px; color: var(--text);
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  #toast.show { opacity: 1; }

  /* Drop overlay */
  #drop-overlay {
    position: absolute; inset: 0; z-index: 500;
    background: rgba(74,158,255,0.15);
    border: 3px dashed var(--accent);
    border-radius: 16px;
    display: none; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: var(--accent);
    pointer-events: none;
  }
  #drop-overlay.show { display: flex; }

  /* Leaflet overrides */
  .leaflet-control-zoom { display: none; }
  .leaflet-popup-content-wrapper {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 13px;
  }
  .leaflet-popup-tip { background: var(--surface2); }

  /* Loading */
  #loading {
    position: absolute; inset: 0; z-index: 600;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  #loading .logo { font-size: 48px; }
  #loading .name { font-size: 20px; font-weight: 700; color: var(--text); }
  #loading .sub { font-size: 13px; color: var(--text2); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="logo">🗺️</div>
  <div class="name">Arazi Harita</div>
  <div class="sub">Yükleniyor...</div>
  <div class="spinner"></div>
</div>

<div id="map"></div>

<div id="topbar">
  <button id="upload-btn" onclick="document.getElementById('file-input').click()">
    📂 Yükle
  </button>
  <input type="file" id="file-input" accept=".dxf,.dwg,.kml,.kmz">
  <span id="file-label">DXF · DWG · KML · KMZ</span>
  <span id="coord-display" id="coord-display">—</span>
</div>

<div id="dist-panel">
  <div class="title">Mesafe Ölçümü — haritaya dokun</div>
  <span id="dist-value">—</span>
  <span id="dist-clear" onclick="clearDistance()">✕ Temizle</span>
</div>

<div id="toolbar">
  <div class="tool-btn" id="btn-gps" onclick="toggleGPS()">
    <span class="icon">📍</span>
    <span>GPS</span>
  </div>
  <div class="tool-btn" id="btn-dist" onclick="toggleDistance()">
    <span class="icon">📏</span>
    <span>Mesafe</span>
  </div>
  <div class="tool-btn" id="btn-layers" onclick="toggleLayers()">
    <span class="icon">🗂️</span>
    <span>Katmanlar</span>
  </div>
  <div class="tool-btn" id="btn-fit" onclick="fitToData()">
    <span class="icon">⊡</span>
    <span>Sığdır</span>
  </div>
</div>

<div id="layer-panel">
  <h3>Katmanlar</h3>
  <div id="layer-list"></div>
</div>

<div id="toast"></div>
<div id="drop-overlay" class="show">📂 Dosyayı bırak</div>

<script>
let map, layerGroups = {}, allBounds = null;
let gpsWatcher = null, gpsMarker = null, gpsCircle = null;
let gpsActive = false;
let distMode = false, distPoints = [], distLine = null, distMarkers = [];
const COLORS = ['#4a9eff','#00d4aa','#ff9f43','#ff6b6b','#a29bfe','#fd79a8','#55efc4'];
let colorIdx = 0;

window.addEventListener('load', () => {
  initMap();
  setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 800);
});

function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
  map.setView([39.0, 35.0], 6);

  map.on('click', onMapClick);
  map.on('mousemove', onMapMove);

  // Drop zone
  const body = document.body;
  body.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('show'); });
  body.addEventListener('dragleave', () => document.getElementById('drop-overlay').classList.remove('show'));
  body.addEventListener('drop', e => {
    e.preventDefault();
    document.getElementById('drop-overlay').classList.remove('show');
    handleFile(e.dataTransfer.files[0]);
  });

  document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));
  document.getElementById('drop-overlay').style.display = 'none';
}

function onMapMove(e) {
  const lat = e.latlng.lat.toFixed(6), lng = e.latlng.lng.toFixed(6);
  document.getElementById('coord-display').textContent = lat + ', ' + lng;
}

function onMapClick(e) {
  if (!distMode) return;
  distPoints.push(e.latlng);
  const m = L.circleMarker(e.latlng, {radius:6, color:'#fff', fillColor:'#ff9f43', fillOpacity:1, weight:2}).addTo(map);
  distMarkers.push(m);

  if (distPoints.length === 2) {
    if (distLine) map.removeLayer(distLine);
    distLine = L.polyline(distPoints, {color:'#ff9f43', weight:2, dashArray:'6,4'}).addTo(map);
    const d = distPoints[0].distanceTo(distPoints[1]);
    document.getElementById('dist-value').textContent = d >= 1000 ? (d/1000).toFixed(3) + ' km' : d.toFixed(1) + ' m';
    distPoints = [];
    showToast('Ölçüm tamamlandı');
  } else {
    document.getElementById('dist-value').textContent = 'İkinci noktayı seç...';
  }
}

function clearDistance() {
  distPoints = [];
  distMarkers.forEach(m => map.removeLayer(m));
  distMarkers = [];
  if (distLine) { map.removeLayer(distLine); distLine = null; }
  document.getElementById('dist-value').textContent = '—';
}

function toggleDistance() {
  distMode = !distMode;
  const btn = document.getElementById('btn-dist');
  const panel = document.getElementById('dist-panel');
  btn.classList.toggle('active', distMode);
  panel.style.display = distMode ? 'block' : 'none';
  if (distMode) { clearDistance(); showToast('Haritada iki noktaya dokun'); }
  closeLayers();
}

function toggleLayers() {
  const panel = document.getElementById('layer-panel');
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  document.getElementById('btn-layers').classList.toggle('active', !open);
}

function closeLayers() {
  document.getElementById('layer-panel').style.display = 'none';
  document.getElementById('btn-layers').classList.remove('active');
}

function toggleGPS() {
  if (gpsActive) {
    stopGPS();
  } else {
    startGPS();
  }
}

function startGPS() {
  if (!navigator.geolocation) { showToast('GPS desteklenmiyor'); return; }
  const btn = document.getElementById('btn-gps');
  btn.querySelector('span:last-child').textContent = '...';

  gpsWatcher = navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
    gpsActive = true;
    btn.classList.add('gps-active');
    btn.querySelector('span:last-child').textContent = 'GPS';

    if (gpsMarker) { map.removeLayer(gpsMarker); map.removeLayer(gpsCircle); }
    gpsCircle = L.circle([lat,lng], {radius:acc, color:'#00d4aa', fillColor:'#00d4aa', fillOpacity:0.08, weight:1}).addTo(map);
    gpsMarker = L.circleMarker([lat,lng], {radius:9, color:'#fff', fillColor:'#00d4aa', fillOpacity:1, weight:2.5})
      .addTo(map).bindPopup('Konumunuz<br>±' + Math.round(acc) + 'm');
    map.setView([lat,lng], map.getZoom() < 15 ? 16 : map.getZoom());
  }, err => {
    gpsActive = false;
    btn.classList.remove('gps-active');
    btn.querySelector('span:last-child').textContent = 'GPS';
    if (err.code === 1) showToast('GPS izni gerekli');
    else showToast('GPS alınamadı');
  }, { enableHighAccuracy: true, maximumAge: 3000 });
}

function stopGPS() {
  if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
  gpsActive = false;
  const btn = document.getElementById('btn-gps');
  btn.classList.remove('gps-active');
  btn.querySelector('span:last-child').textContent = 'GPS';
  if (gpsMarker) { map.removeLayer(gpsMarker); map.removeLayer(gpsCircle); gpsMarker = null; }
  showToast('GPS kapatıldı');
}

function fitToData() {
  if (allBounds) map.fitBounds(allBounds.pad(0.1));
  else showToast('Henüz dosya yüklenmedi');
}

function handleFile(file) {
  if (!file) return;
  const name = file.name.toLowerCase();
  document.getElementById('file-label').textContent = file.name;
  showToast('Yükleniyor...');

  if (name.endsWith('.kml')) {
    const r = new FileReader();
    r.onload = e => parseKML(e.target.result, file.name);
    r.readAsText(file);
  } else if (name.endsWith('.kmz')) {
    const r = new FileReader();
    r.onload = e => parseKMZ(e.target.result, file.name);
    r.readAsArrayBuffer(file);
  } else if (name.endsWith('.dxf')) {
    const r = new FileReader();
    r.onload = e => parseDXF(e.target.result, file.name);
    r.readAsText(file);
  } else if (name.endsWith('.dwg')) {
    showToast('DWG: Civil 3D\'den DXF veya KMZ olarak export edin');
  }
}

function addLayer(name, leafletLayer, color, count) {
  const id = 'layer_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  layerGroups[id] = { layer: leafletLayer, visible: true, name, color, count };
  leafletLayer.addTo(map);
  renderLayerList();
  return id;
}

function renderLayerList() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  Object.entries(layerGroups).forEach(([id, info]) => {
    const item = document.createElement('div');
    item.className = 'layer-item';
    item.innerHTML = `
      <div class="layer-color" style="background:${info.color}"></div>
      <span class="layer-name">${info.name}</span>
      <span class="layer-count">${info.count} obj.</span>
      <div class="layer-toggle ${info.visible ? '' : 'off'}" onclick="toggleLayer('${id}')"></div>
    `;
    list.appendChild(item);
  });
  if (Object.keys(layerGroups).length === 0) {
    list.innerHTML = '<div style="color:var(--text2);font-size:13px;text-align:center;padding:16px">Henüz katman yok</div>';
  }
}

function toggleLayer(id) {
  const info = layerGroups[id];
  if (!info) return;
  info.visible = !info.visible;
  if (info.visible) map.addLayer(info.layer);
  else map.removeLayer(info.layer);
  renderLayerList();
}

function parseKML(text, name) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/xml');
  const lg = L.layerGroup();
  const coords = [];
  let count = 0;
  const color = COLORS[colorIdx++ % COLORS.length];

  doc.querySelectorAll('Placemark').forEach(pm => {
    const pname = pm.querySelector('name')?.textContent || '';
    const lineEl = pm.querySelector('LineString coordinates');
    const polyEl = pm.querySelector('Polygon outerBoundaryIs LinearRing coordinates');
    const pointEl = pm.querySelector('Point coordinates');

    if (lineEl) {
      const pts = kmlPts(lineEl.textContent);
      if (pts.length) { L.polyline(pts, {color, weight:2}).addTo(lg).bindPopup(pname||'Çizgi'); pts.forEach(p=>coords.push(p)); count++; }
    }
    if (polyEl) {
      const pts = kmlPts(polyEl.textContent);
      if (pts.length) { L.polygon(pts, {color, weight:2, fillOpacity:0.1}).addTo(lg).bindPopup(pname||'Alan'); pts.forEach(p=>coords.push(p)); count++; }
    }
    if (pointEl) {
      const p = pointEl.textContent.trim().split(/[\s,]+/);
      if (p.length >= 2) {
        const lat=parseFloat(p[1]), lng=parseFloat(p[0]);
        if (!isNaN(lat)&&!isNaN(lng)) { L.circleMarker([lat,lng],{radius:5,color,fillColor:color,fillOpacity:0.9}).addTo(lg).bindPopup(pname||'Nokta'); coords.push([lat,lng]); count++; }
      }
    }
  });

  if (coords.length) {
    allBounds = L.latLngBounds(coords);
    map.fitBounds(allBounds.pad(0.1));
    addLayer(name, lg, color, count);
    showToast(count + ' obje yüklendi');
  } else { showToast('Geometri bulunamadı'); }
}

function kmlPts(text) {
  return text.trim().split(/\s+/).map(c => {
    const p = c.split(',');
    if (p.length >= 2) { const lng=parseFloat(p[0]),lat=parseFloat(p[1]); if (!isNaN(lat)&&!isNaN(lng)) return [lat,lng]; }
    return null;
  }).filter(Boolean);
}

async function parseKMZ(buffer, name) {
  try {
    const zip = await JSZip.loadAsync(buffer);
    const kmlFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.kml'));
    if (!kmlFile) { showToast('KMZ içinde KML bulunamadı'); return; }
    const kmlText = await zip.files[kmlFile].async('text');
    parseKML(kmlText, name);
  } catch(e) { showToast('KMZ açılamadı'); }
}

function parseDXF(text, name) {
  const lines = text.split('\n').map(l => l.trim());
  const lg = L.layerGroup();
  const coords = [];
  let count = 0;
  const color = COLORS[colorIdx++ % COLORS.length];
  let i = 0;

  while (i < lines.length - 1) {
    if (lines[i] === '0') {
      const etype = lines[i+1].trim();
      if (['LINE','LWPOLYLINE','POLYLINE','POINT','CIRCLE'].includes(etype)) {
        const ent = { type: etype };
        let x10=[], y20=[], x11=NaN, y21=NaN;
        let j = i + 2;
        while (j < Math.min(i + 300, lines.length - 1)) {
          const code = parseInt(lines[j]);
          const val = parseFloat(lines[j+1]);
          if (!isNaN(code) && !isNaN(val)) {
            if (code===10) x10.push(val);
            else if (code===20) y20.push(val);
            else if (code===11) x11=val;
            else if (code===21) y21=val;
            else if (code===0) break;
          }
          j += 2;
        }

        if (x10.length > 0 && y20.length > 0) {
          const avgX = x10.reduce((a,b)=>a+b,0)/x10.length;
          const avgY = y20.reduce((a,b)=>a+b,0)/y20.length;
          const isGeo = avgX>=-180&&avgX<=180&&avgY>=-90&&avgY<=90;

          if (isGeo) {
            if (etype==='POINT') {
              L.circleMarker([y20[0],x10[0]],{radius:4,color,fillColor:color,fillOpacity:0.9}).addTo(lg);
              coords.push([y20[0],x10[0]]); count++;
            } else if (etype==='LINE' && !isNaN(x11) && !isNaN(y21)) {
              L.polyline([[y20[0],x10[0]],[y21,x11]],{color,weight:1.5}).addTo(lg);
              coords.push([y20[0],x10[0]],[y21,x11]); count++;
            } else if ((etype==='LWPOLYLINE'||etype==='POLYLINE') && x10.length>1) {
              const pts = x10.map((x,k)=>[y20[k],x]).filter(p=>p[0]&&p[1]&&!isNaN(p[0])&&!isNaN(p[1]));
              if (pts.length>1) { L.polyline(pts,{color,weight:1.5}).addTo(lg); pts.forEach(p=>coords.push(p)); count++; }
            }
          }
        }
      }
    }
    i++;
  }

  if (coords.length) {
    allBounds = L.latLngBounds(coords);
    map.fitBounds(allBounds.pad(0.1));
    addLayer(name, lg, color, count);
    showToast(count + ' obje yüklendi');
  } else {
    showToast('Coğrafi koordinat bulunamadı — KMZ deneyin');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

</body>
</html>
